<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Config Text</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; }
    body { max-width: 800px; margin: 32px auto; padding: 20px; font-family: sans-serif; color: #202124; background: #fafafa; }
    textarea { width: 100%; min-height: 260px; resize: vertical; font-size: 16px; line-height: 1.6; }
    input, textarea { border: 1px solid #d8dde3; border-radius: 8px; padding: 12px; background: #fff; }
    input { width: 100%; margin: 6px 0 12px; font-size: 16px; }
    button { width: 100%; min-height: 48px; margin: 0; padding: 12px 18px; border: 1px solid #cfd6dd; border-radius: 8px; background: #fff; color: #202124; font-size: 16px; text-align: left; cursor: pointer; }
    button:hover { background: #f1f5f8; }
    button:disabled { cursor: not-allowed; opacity: .65; }
    #message { margin-top: 12px; color: green; }
    .view-mode { background: #fff; padding: 20px; border: 1px solid #e2e6ea; border-radius: 8px; font-size: 17px; line-height: 1.75; white-space: pre-wrap; overflow-wrap: anywhere; }
    .toolbar { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 16px; }
    .login-box { max-width: 420px; }
    .edit-actions { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 12px; }
    .error { color: red; }

    @media (max-width: 600px) {
      body { width: 100%; margin: 0; padding: 16px; }
      .view-mode { padding: 18px; font-size: 18px; }
      button { min-height: 52px; font-size: 17px; }
      textarea { min-height: 320px; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    // ========== 配置 ==========
    const SUPABASE_URL = 'https://pdmilqnfrksnmusoaqsa.supabase.co'
    const SUPABASE_ANON_KEY = 'sb_publishable_4DoBMs3uCXbRkRIBnTtaTw_BgzjHe8f'
    const TABLE_NAME = 'config_text'
    const ROW_ID = 1

    // ✅ 修复：变量名改为 supabaseClient
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
    const app = document.getElementById('app')

    // ========== 初始化 ==========
    async function init() {
      const params = new URLSearchParams(window.location.search)
      const format = params.get('format')
      const mode = params.get('mode')

      if (format === 'raw') {
        showRawText()
        return
      }

      mode === 'edit' ? showEditMode() : showViewMode()
    }

    // ========== 纯文字链接 ==========
    async function showRawText() {
      const { data, error } = await supabaseClient
        .from(TABLE_NAME)
        .select('content')
        .eq('id', ROW_ID)
        .single()

      document.body.innerHTML = ''
      document.body.style.maxWidth = 'none'
      document.body.style.margin = '0'
      document.body.style.padding = '0'
      document.body.style.whiteSpace = 'pre-wrap'
      document.body.style.fontFamily = 'monospace'

      if (error || !data) {
        document.body.textContent = ''
        return
      }

      document.body.textContent = data.content || ''
    }

    // ========== 只读模式 ==========
    async function showViewMode() {
      const { data, error } = await supabaseClient  // ✅ 改这里
        .from(TABLE_NAME)
        .select('content')
        .eq('id', ROW_ID)
        .single()
        
      console.log({ data, error })
      if (error || !data) {
        app.innerHTML = '<p>暂无内容</p>'
        return
      }

      app.innerHTML = `
        <div class="view-mode">${escapeHtml(data.content)}</div>
        <div class="toolbar">
          <button onclick="goEditMode()">✏️ 编辑</button>
          <button onclick="copyContent()">📋 复制文字</button>
          <button onclick="copyRawLink()">🔗 复制 API 配置</button>
        </div>
      `
      
      // 把内容存到全局方便复制
      window.currentContent = data.content
    }

    // ========== 编辑模式 ==========
    async function showEditMode() {
      const { data: sessionData } = await supabaseClient.auth.getSession()
      if (!sessionData.session) {
        showLoginMode()
        return
      }

      const { data } = await supabaseClient  // ✅ 改这里
        .from(TABLE_NAME)
        .select('content')
        .eq('id', ROW_ID)
        .single()

      app.innerHTML = `
        <h2>编辑内容</h2>
        <textarea id="editText">${escapeHtml(data?.content || '')}</textarea>
        <div class="edit-actions">
          <button onclick="saveContent()">💾 保存</button>
          <button onclick="location.href='?'">❌ 取消</button>
        </div>
        <div id="message"></div>
      `
    }

    // ========== 登录后进入编辑模式 ==========
    function showLoginMode() {
      app.innerHTML = `
        <div class="login-box">
          <h2>登录后编辑</h2>
          <form onsubmit="loginForEdit(event)">
            <label for="loginEmail">用户名/邮箱</label>
            <input id="loginEmail" type="email" autocomplete="username" required>

            <label for="loginPassword">密码</label>
            <input id="loginPassword" type="password" autocomplete="current-password" required>

            <button id="loginButton" type="submit">登录</button>
            <button type="button" onclick="location.href='?'">取消</button>
          </form>
          <div id="message"></div>
        </div>
      `
    }

    async function loginForEdit(event) {
      event.preventDefault()

      const email = document.getElementById('loginEmail').value.trim()
      const password = document.getElementById('loginPassword').value
      const button = document.getElementById('loginButton')
      const msg = document.getElementById('message')

      button.disabled = true
      msg.textContent = '登录中...'
      msg.className = ''

      const { error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      })

      if (error) {
        msg.textContent = '登录失败: ' + error.message
        msg.className = 'error'
        button.disabled = false
        return
      }

      msg.textContent = '登录成功，正在进入编辑页面...'
      await showEditMode()
    }

    // ========== 保存 ==========
    async function saveContent() {
      const newText = document.getElementById('editText').value

      const { error } = await supabaseClient  // ✅ 改这里
        .from(TABLE_NAME)
        .update({ content: newText })
        .eq('id', ROW_ID)

      const msg = document.getElementById('message')
      if (error) {
        msg.textContent = '保存失败: ' + error.message
        msg.style.color = 'red'
      } else {
        msg.textContent = '✅ 保存成功！'
        setTimeout(() => location.href = '?', 500)
      }
    }

    // ========== 复制 ==========
    function goEditMode() {
      location.href = '?mode=edit'
    }

    function copyContent() {
      navigator.clipboard.writeText(window.currentContent || '').then(() => {
        alert('已复制')
      })
    }

    function copyRawLink() {
      const text = getApiShortcutText()

      navigator.clipboard.writeText(text).then(() => {
        alert('API 配置已复制')
      })
    }

    function getSupabaseContentUrl() {
      return `${SUPABASE_URL}/rest/v1/${TABLE_NAME}?select=content&id=eq.${ROW_ID}`
    }

    function getApiShortcutText() {
      return `URL: ${getSupabaseContentUrl()}
apikey: ${SUPABASE_ANON_KEY}
Authorization: Bearer ${SUPABASE_ANON_KEY}
Accept: application/json`
    }

    // ========== 工具函数 ==========
    function escapeHtml(text) {
      const div = document.createElement('div')
      div.textContent = text
      return div.innerHTML
    }

    init()
  </script>
</body>
</html>
